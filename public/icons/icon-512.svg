<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>

    <!-- Board Top Gradient -->
    <linearGradient id="boardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    
    <!-- Pawn Body Gradient (3D Shading) -->
    <radialGradient id="pawnGrad" cx="35%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b45309;stop-opacity:1" />
    </radialGradient>

    <!-- Pawn Shadow (Grounding) -->
    <radialGradient id="pawnShadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0.45" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Rounded Background -->
  <rect width="512" height="512" rx="90" fill="url(#bgGrad)"/>

  <!-- Board Thickness (Sides) -->
  <path d="M52 240 L256 360 L256 390 L52 270 Z" fill="#334155"/>
  <path d="M460 240 L256 360 L256 390 L460 270 Z" fill="#1e293b"/>

  <!-- Board Top -->
  <path d="M256 120 L460 240 L256 360 L52 240 Z" fill="url(#boardGrad)"/>

  <!-- Simplified 4x4 Grid -->
  <g stroke="#94a3b8" stroke-width="2.5" opacity="0.35">
    <line x1="205" y1="150" x2="409" y2="270" />
    <line x1="154" y1="180" x2="358" y2="300" />
    <line x1="103" y1="210" x2="307" y2="330" />
    <line x1="307" y1="150" x2="103" y2="270" />
    <line x1="358" y1="180" x2="154" y2="300" />
    <line x1="409" y1="210" x2="205" y2="330" />
  </g>

  <!-- Pawn Shadow on Board -->
  <ellipse cx="256" cy="305" rx="50" ry="25" fill="url(#pawnShadow)" />

  <!-- Piece (Highly Rounded 3D Pawn) -->
  <g transform="translate(256, 305)">
    <!-- Base Rings -->
    <ellipse cx="0" cy="0" rx="42" ry="18" fill="#b45309" />
    <ellipse cx="0" cy="-6" rx="38" ry="16" fill="url(#pawnGrad)" />
    
    <!-- Body (Smooth Curved Stem) -->
    <path d="M-28 -8 C-20 -45, -8 -65, 0 -65 C8 -65, 20 -45, 28 -8 Z" fill="url(#pawnGrad)" />
    
    <!-- Collar (Ring under head) -->
    <ellipse cx="0" cy="-62" rx="18" ry="6" fill="#f59e0b" stroke="#b45309" stroke-width="0.5" />
    
    <!-- Head (Perfectly Spherical with Shine) -->
    <circle cx="0" cy="-86" r="26" fill="url(#pawnGrad)" />
    
    <!-- Highlight Reflection -->
    <circle cx="-10" cy="-96" r="8" fill="#ffffff" opacity="0.35" />
    <ellipse cx="-4" cy="-100" rx="4" ry="2" fill="#ffffff" opacity="0.5" transform="rotate(-30, -4, -100)" />
  </g>
</svg>
